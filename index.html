<style>

  :root{

    --border:#1a2a3a;--text:#c8d6e5;--text-dim:#6b7d95;--accent:#2dd4bf;
    --accent-dim:#0f766e;--danger:#ef4444;--warning:#f59e0b;
    --day:#f59e0b;--night:#6366f1;--anytime:#22c55e;--trawl:#f472b6;--pot:#fb923c;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
  .header{background:linear-gradient(180deg,rgba(13,21,32,0.95) 0%,rgba(7,11,16,0.98) 100%);border-bottom:1px solid var(--border);padding:14px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
  .header-inner{max-width:1280px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .logo{font-size:1.4rem;font-weight:800;color:var(--accent);letter-spacing:2px;white-space:nowrap}
  .nav{display:flex;gap:4px;flex-wrap:wrap}
  .nav a{color:var(--text-dim);text-decoration:none;padding:6px 12px;border-radius:6px;font-size:0.85rem;transition:all .2s;white-space:nowrap}
  .nav a:hover,.nav a.active{color:var(--accent);background:rgba(45,212,191,0.08)}
  .lang-switch{display:flex;gap:2px;margin-left:8px}
  .lang-btn{background:none;border:1px solid var(--border);color:var(--text-dim);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:0.75rem;transition:all .2s}
  .lang-btn:hover{border-color:var(--accent);color:var(--text)}
  .lang-btn.active{background:rgba(45,212,191,0.15);color:var(--accent);border-color:var(--accent-dim)}
  .main{max-width:1280px;margin:0 auto;padding:24px 20px 60px}
  .section{margin-bottom:48px}
  .section-title{font-size:1.35rem;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:10px}
  .section-title::before{content:'';display:inline-block;width:4px;height:24px;background:var(--accent);border-radius:2px}
  .section-desc{color:var(--text-dim);font-size:.9rem;margin-bottom:20px}
  .filters{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .filters label{font-size:.78rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
  .filters select,.filters input{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:.85rem;outline:none;transition:border-color .2s}
  .filters select:focus,.filters input:focus{border-color:var(--accent)}
  .filters input{min-width:180px}
  .filters input::placeholder{color:var(--text-dim)}
  .filter-group{display:flex;align-items:center;gap:6px}
  .btn-reset{margin-left:auto;background:none;border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:.78rem;transition:all .2s}
  .btn-reset:hover{border-color:var(--accent);color:var(--accent)}
  .stats-bar{display:flex;align-items:center;gap:16px;margin-bottom:14px;font-size:.82rem;color:var(--text-dim)}
  .stats-bar strong{color:var(--accent)}
  .fish-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .fish-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px;transition:all .2s;cursor:pointer;position:relative}
  .fish-card:hover{background:var(--bg-card-hover);border-color:var(--accent-dim);transform:translateY(-2px)}
  .fish-card.expanded{border-color:var(--accent);grid-column:1/-1;background:var(--bg-detail)}
  .fish-card.aberrant{border-left:3px solid #a855f7}
  .fish-card .expand-hint{position:absolute;top:14px;right:14px;font-size:.68rem;color:var(--text-dim);opacity:0;transition:opacity .2s}
  .fish-card:hover .expand-hint{opacity:1}
  .fish-name{font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
  .fish-latin{font-size:.78rem;color:var(--text-dim);font-style:italic;margin-bottom:10px}
  .fish-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .tag{font-size:.7rem;font-weight:600;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px}
  .tag-location{background:rgba(45,212,191,0.12);color:var(--accent)}
  .tag-day{background:rgba(245,158,11,0.12);color:var(--day)}
  .tag-night{background:rgba(99,102,241,0.12);color:var(--night)}
  .tag-anytime{background:rgba(34,197,94,0.12);color:var(--anytime)}
  .tag-depth{background:rgba(107,125,149,0.12);color:var(--text-dim)}
  .tag-type{background:rgba(168,85,247,0.12);color:#c084fc}
  .tag-method.trawl{background:rgba(244,114,182,0.15);color:var(--trawl)}
  .tag-method.pot{background:rgba(251,146,60,0.15);color:var(--pot)}
  .tag-method.rod{background:rgba(45,212,191,0.12);color:var(--accent)}
  .fish-info{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;font-size:.78rem}
  .fish-info dt{color:var(--text-dim)}
  .fish-info dd{color:var(--text);font-weight:500;text-align:right}
  .fish-detail{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);animation:slideDown .2s ease}
  .fish-card.expanded .fish-detail{display:block}
  @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .fish-detail h4{font-size:.78rem;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
  .detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
  .detail-block{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:8px;padding:12px 14px}
  .detail-block h5{font-size:.7rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
  .detail-block p{font-size:.82rem;color:var(--text);line-height:1.6}
  .detail-block .sub-loc{color:var(--accent);font-weight:600;font-size:.8rem;display:block;margin-bottom:4px}
  .detail-block .tip{color:var(--warning);font-size:.78rem}
  .detail-block .note{color:var(--text-dim);font-size:.76rem;margin-top:4px}
  .no-results{text-align:center;padding:60px 20px;color:var(--text-dim)}
  .no-results strong{display:block;color:var(--text);margin-bottom:4px}
  .equip-table{width:100%;border-collapse:collapse;font-size:.85rem}
  .equip-table th{text-align:left;padding:10px 14px;color:var(--text-dim);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border)}
  .equip-table td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:top}
  .equip-table tr:hover td{background:rgba(45,212,191,0.03)}
  .equip-cat{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(45,212,191,0.12);color:var(--accent);margin-right:4px}
  .area-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .area-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:20px;transition:all .2s}
  .area-card:hover{background:var(--bg-card-hover)}
  .area-name{font-size:1.1rem;font-weight:700;margin-bottom:4px}
  .area-depth{font-size:.78rem;color:var(--accent);margin-bottom:10px}
  .area-desc{font-size:.82rem;color:var(--text-dim);margin-bottom:12px;line-height:1.6}
  .area-fish{font-size:.78rem;color:var(--text-dim)}
  .area-fish strong{color:var(--text)}
  .timeline{position:relative;padding-left:28px;margin:20px 0}
  .timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--border)}
  .timeline-item{position:relative;margin-bottom:24px}
  .timeline-item::before{content:'';position:absolute;left:-22px;top:6px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
  .timeline-step{font-size:.72rem;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
  .timeline-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:4px}
  .timeline-desc{font-size:.82rem;color:var(--text-dim);line-height:1.6}
  .npc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
  .npc-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px;transition:all .2s;cursor:pointer}
  .npc-card:hover{background:var(--bg-card-hover);border-color:var(--accent-dim)}
  .npc-card.expanded{border-color:var(--accent);background:var(--bg-detail)}

  .npc-icon{width:42px;height:42px;border-radius:50%;background:rgba(45,212,191,0.1);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
  .npc-name{font-weight:700;font-size:.9rem}
  .npc-loc{font-size:.72rem;color:var(--accent)}
  .npc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
  .npc-tag{font-size:.66rem;padding:2px 7px;border-radius:3px;font-weight:600}
  .npc-tag.quest{background:rgba(245,158,11,0.15);color:var(--warning)}
  .npc-tag.shop{background:rgba(45,212,191,0.12);color:var(--accent)}
  .npc-tag.story{background:rgba(168,85,247,0.15);color:#c084fc}
  .npc-desc{font-size:.8rem;color:var(--text-dim);line-height:1.5}
  .npc-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);animation:slideDown .2s ease}
  .npc-card.expanded .npc-detail{display:block}
  .npc-detail h5{font-size:.72rem;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
  .npc-detail ul{list-style:none;padding:0}
  .npc-detail li{font-size:.8rem;color:var(--text-dim);padding:4px 0 4px 16px;position:relative;line-height:1.5}
  .npc-detail li::before{content:'›';position:absolute;left:0;color:var(--accent);font-weight:700}
  .spoiler-toggle{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:var(--danger);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:600;margin:12px 0;transition:all .2s}
  .spoiler-toggle:hover{background:rgba(239,68,68,0.2)}
  .spoiler-content{display:none}
  .spoiler-content.show{display:block;animation:slideDown .2s ease}
  .guide-banner{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px}
  .guide-banner>div{flex:1;min-width:280px;border-radius:8px;padding:14px 16px}
  .guide-banner .guide-title{font-weight:700;font-size:.82rem;margin-bottom:6px}
  .guide-banner .guide-text{font-size:.76rem;color:var(--text-dim);line-height:1.6}
  .guide-banner .guide-text strong{color:var(--text)}
  .aberration-badge{display:inline-block;font-size:.62rem;font-weight:700;color:#c084fc;background:rgba(168,85,247,0.15);padding:2px 6px;border-radius:3px;text-transform:uppercase}
  .footer{text-align:center;padding:32px 20px;color:var(--text-dim);font-size:.78rem;border-top:1px solid var(--border)}
  .footer a{color:var(--accent);text-decoration:none}
  @media(max-width:640px){
    .header-inner{flex-direction:column;align-items:flex-start}
    .filters{flex-direction:column;align-items:stretch}
    .filters input{min-width:auto}
    .btn-reset{margin-left:0}
    .fish-grid,.area-grid,.npc-grid{grid-template-columns:1fr}
    .detail-grid{grid-template-columns:1fr}
  }
</style>
 
</head>

    faq: {
      title:'常见问题',
      q1:'如何钓畸变鱼？',

      a6:'纯主线约 8-12 小时。全收集（全鱼类 + 全畸变 + 全任务）约 20-30 小时。DLC 苍白之域加 3-5 小时。有两个结局，取决于最终选择。',

      a8:'<strong>拖网</strong>：装在船尾，航行中自动捕获小鱼/水母，主动收益。容量有限，满后需手动取出。<strong>蟹笼</strong>：放在水中，8-12 小时后自动捕获甲壳类。被动收益，需要记住位置回来收。拖网效率更高，蟹笼适合顺手放几个。',

function t(path) {
  const keys = path.split('.');
  let val = I18N[LANG];
  for (const k of keys) { if (val == null) return path; val = val[k]; }
  return val != null ? val : path;
}

// ── Language Switcher ──────────────
function setLang(lang) {
  LANG = lang;
  localStorage.setItem('dredge-lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  document.documentElement.lang = {zh:'zh-CN',en:'en',ja:'ja'}[lang];
  renderAll();
}

function renderAll() {
  const fns = [
    ['renderNav', renderNav],
    ['renderFilters', renderFilters],
    ['renderFish', ()=>renderFish(fishData)],
    ['renderGuideBanner', renderGuideBanner],
    ['renderEquipTable', renderEquipTable],
    ['renderAreas', renderAreas],
    ['renderNPCs', renderNPCs],
    ['renderTimeline', renderTimeline],
    ['renderSideQuests', renderSideQuests],
    ['renderFAQ', renderFAQ],
    ['data-i18n', ()=>{ document.querySelectorAll('[data-i18n]').forEach(el => { const val = t(el.dataset.i18n); if (val) el.innerHTML = val; }); }],
  ];
  for (const [name, fn] of fns) {
    try { fn(); } catch(e) {
      console.error('renderAll failed at', name, e);
      const el = document.getElementById(name === 'data-i18n' ? 'fishGrid' : (name === 'renderFish' ? 'fishGrid' : name.replace('render','').toLowerCase()));
      // Try to find a relevant container
      const container = document.getElementById('fishGrid') || document.body;
      container.innerHTML += '<div style="background:#300;color:#f88;padding:10px;margin:8px;border-radius:4px;">Error in ' + name + ': ' + e.message + '</div>';
    }
  }
}

// ── Nav ─────────────────────────────
function renderNav() {
  const nav = document.getElementById('mainNav');
  const items = ['fish','equipment','areas','quests','faq'];
  nav.innerHTML = items.map(k => `<a href="#${k}">${t('nav.'+k)}</a>`).join('');
  nav.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      const target = document.querySelector(a.getAttribute('href'));
      if (target) target.scrollIntoView({ behavior:'smooth', block:'start' });
      nav.querySelectorAll('a').forEach(x => x.classList.remove('active'));
      a.classList.add('active');
    });
  });
}

// ── Language Buttons ────────────────
function renderLangSwitch() {
  const container = document.getElementById('langSwitch');
  const langs = [
    { code:'zh', label:'中' },
    { code:'en', label:'EN' },
    { code:'ja', label:'日' }
  ];
  container.innerHTML = langs.map(l =>
    `<button class="lang-btn${LANG===l.code?' active':''}" data-lang="${l.code}">${l.label}</button>`
  ).join('');
  container.querySelectorAll('.lang-btn').forEach(b => {
    b.addEventListener('click', () => setLang(b.dataset.lang));
  });
}

// RENDER FUNCTIONS
// ═══════════════════════════════════════

let expandedId = null;

function locTL(key) { return (I18N[LANG].locations && I18N[LANG].locations[key]) || key; }
function timeTL(time) {
  if (time==='day') return t('timeLabel.day');
  if (time==='night') return t('timeLabel.night');
  return t('timeLabel.any');
}
function depthTL(d) { return t(d==='shallow'?'depthLabel.shallow':'depthLabel.deep'); }
function typeTL(ty) { return t('typeLabel.'+ty)||ty; }
function methodTL(m) { return t('methodLabel.'+m)||m; }

function renderFilters() {
  const container = document.getElementById('fishFilters');
  container.innerHTML = `
    <div class="filter-group"><label>${t('fish.search')}</label><input type="text" id="searchInput" placeholder="${t('fish.search')}"></div>
    <div class="filter-group"><label>${t('fish.filterLoc')}</label><select id="filterLocation"><option value="">${t('fish.allLoc')}</option>${Object.keys(I18N[LANG].locations||I18N.zh.locations).map(k => `<option value="${k}">${locTL(k)}</option>`).join('')}</select></div>
    <div class="filter-group"><label>${t('fish.filterTime')}</label><select id="filterTime"><option value="">${t('fish.allTime')}</option><option value="day">${t('timeLabel.day')}</option><option value="night">${t('timeLabel.night')}</option><option value="any">${t('timeLabel.any')}</option></select></div>
    <div class="filter-group"><label>${t('fish.filterMethod')}</label><select id="filterMethod"><option value="">${t('fish.allMethod')}</option><option value="rod">${t('methodLabel.rod')}</option><option value="trawl">${t('methodLabel.trawl')}</option><option value="pot">${t('methodLabel.pot')}</option></select></div>
    <div class="filter-group"><label>${t('fish.filterDepth')}</label><select id="filterDepth"><option value="">${t('fish.allDepth')}</option><option value="shallow">${t('depthLabel.shallow')}</option><option value="deep">${t('depthLabel.deep')}</option></select></div>
    <div class="filter-group"><label>${t('fish.filterType')}</label><select id="filterType"><option value="">${t('fish.allType')}</option>${['coastal','oceanic','mangrove','volcanic','ice','abyssal','hadal'].map(ty => `<option value="${ty}">${typeTL(ty)}</option>`).join('')}</select></div>
    <div class="filter-group"><input type="checkbox" id="filterAberration" style="width:auto;margin-right:4px;"><label for="filterAberration" style="cursor:pointer;">${t('fish.abOnly')}</label></div>
    <button class="btn-reset" onclick="resetFilters()">${t('fish.reset')}</button>`;
  bindFilterEvents();
}

function bindFilterEvents() {
  const si = document.getElementById('searchInput');
  const fl = document.getElementById('filterLocation');
  const ft = document.getElementById('filterTime');
  const fm = document.getElementById('filterMethod');
  const fd = document.getElementById('filterDepth');
  const fty = document.getElementById('filterType');
  if (si) si.addEventListener('input', filterFish);
  if (fl) fl.addEventListener('change', filterFish);
  if (ft) ft.addEventListener('change', filterFish);
  if (fm) fm.addEventListener('change', filterFish);
  if (fd) fd.addEventListener('change', filterFish);
  if (fty) fty.addEventListener('change', filterFish);
  const fab = document.getElementById('filterAberration');
  if (fab) fab.addEventListener('change', filterFish);
}

function getFilteredFish() {
  const si = document.getElementById('searchInput');
  const fl = document.getElementById('filterLocation');
  const ft = document.getElementById('filterTime');
  const fm = document.getElementById('filterMethod');
  const fd = document.getElementById('filterDepth');
  const fty = document.getElementById('filterType');
  const fab = document.getElementById('filterAberration');
  const search = si ? si.value.toLowerCase().trim() : '';
  const loc = fl ? fl.value : '';
  const time = ft ? ft.value : '';
  const method = fm ? fm.value : '';
  const depth = fd ? fd.value : '';
  const type = fty ? fty.value : '';
  const abOnly = fab ? fab.checked : false;

  return fishData.filter(f => {
    if (search && !f.name.toLowerCase().includes(search) && !f.latin.toLowerCase().includes(search) && !(f.ab&&f.ab.toLowerCase().includes(search)) && !(f.subLoc&&f.subLoc.toLowerCase().includes(search))) return false;
    if (loc && f.location !== loc) return false;
    if (time && f.time !== time) return false;
    if (method && f.method !== method) return false;
    if (depth && f.depth !== depth) return false;
    if (type && f.type !== type) return false;
    if (abOnly && !f.ab) return false;
    return true;
  });
}

function filterFish() { expandedId = null; renderFish(getFilteredFish()); }
function resetFilters() {
  ['searchInput','filterLocation','filterTime','filterMethod','filterDepth','filterType'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  const fab = document.getElementById('filterAberration');
  if (fab) fab.checked = false;
  expandedId = null;
  renderFish(fishData);
}

      <div class="guide-text">${t('fish.potGuideText')}</div>

  grid.innerHTML = list.map((f,i) => {
    const id = `fish-${i}`;

    const locDisp = locTL(f.location);

      <span class="expand-hint">${isExp?t('fish.collapseHint'):t('fish.expandHint')}</span>
      <div class="fish-name">${f.name}${f.ab?` <span class="aberration-badge">${t('fish.abPriceLabel')}: ${f.ab}</span>`:''}</div>
      <div class="fish-latin">${f.latin}</div>
      <div class="fish-tags">
        <span class="tag tag-location">${locDisp}</span>
        <span class="tag tag-${f.time==='day'?'day':f.time==='night'?'night':'anytime'}">${timeTL(f.time)}</span>
        <span class="tag tag-depth">${depthTL(f.depth)}</span>
        <span class="tag tag-type">${typeTL(f.type)}</span>
        <span class="tag tag-method ${f.method}">${methodTL(f.method)}</span>
      </div>
      <dl class="fish-info">
        <dt>${t('fish.methodLabel')}</dt><dd>${methodTL(f.method)}</dd>
        <dt>${t('fish.equipLabel')}</dt><dd>${rodDisp}</dd>
        <dt>${t('fish.sizeLabel')}</dt><dd>${f.size||'2×1'}</dd>
        <dt>${t('fish.priceLabel')}</dt><dd>${f.value}</dd>
        ${f.ab?`<dt>${t('fish.abPriceLabel')}</dt><dd style="color:#c084fc;">${f.abVal}</dd>`:''}
      </dl>
      <div class="fish-detail"><h4>${t('fish.detailTitle')}</h4><div class="detail-grid">
        <div class="detail-block"><h5>${t('fish.subLocTitle')}</h5><span class="sub-loc">${f.subLoc||locDisp}</span><span class="coord">${locDisp}</span></div>
        <div class="detail-block"><h5>${t('fish.condTitle')}</h5><p>${timeTL(f.time)} | ${depthTL(f.depth)} | ${methodTL(f.method)}</p><p class="note">${t('fish.equipLabel')}: ${rodDisp}</p></div>
        <div class="detail-block"><h5>${t('fish.priceTitle')}</h5><p>${t('fish.priceLabel')}: <strong>${f.value}</strong>${f.ab?` → ${t('fish.abPriceLabel')}: <strong style="color:#c084fc;">${f.abVal}</strong> <span class="note">(~3x)</span>`:''}</p><p class="note">${t('fish.sizeLabel')}: ${f.size||'2×1'}</p></div>
        ${f.tip?`<div class="detail-block" style="grid-column:1/-1;"><h5>${t('fish.tipTitle')}</h5><p class="tip">💡 ${f.tip}</p></div>`:''}
      </div></div>
    </div>`;
  }).join('');

  grid.querySelectorAll('.fish-card').forEach(card => {
    card.addEventListener('click', e => {
      const id2 = card.id;
      expandedId = expandedId===id2 ? null : id2;
      renderFish(getFilteredFish());
      if (expandedId) { const el = document.getElementById(expandedId); if (el) el.scrollIntoView({ behavior:'smooth', block:'center' }); }
    });
  });
}

// ── Init ────────────────────────────
window.onerror = function(msg, url, line) {
  document.body.innerHTML = '<div style="background:#200;color:#f88;padding:20px;font-family:monospace;white-space:pre-wrap;"><strong>JS Error:</strong>\n' + msg + '\nLine: ' + line + '</div>';
};
function detectLang() {
  const nav = (navigator.language || '').split('-')[0];
  return I18N[nav] ? nav : 'zh';
}
function boot() {
  const saved = localStorage.getItem('dredge-lang');
  LANG = (saved && I18N[saved]) ? saved : detectLang();
  renderLangSwitch();
  renderAll();
}
try { boot(); } catch(e) {
  document.body.innerHTML = '<div style="background:#200;color:#f88;padding:20px;font-family:monospace;white-space:pre-wrap;"><strong>Boot Error:</strong>\n' + e.message + '\n' + e.stack + '</div>';
}
</script>
